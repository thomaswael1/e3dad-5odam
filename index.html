<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل بيانات - إعداد خدام</title>
    <style>
        :root {
            /* درجات الزجاج الأبيض الشفاف والنقي */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;      /* كحلي داكن مائل للرمادي واضح جداً */
            --text-label: #475569;     /* رمادي وسيط أنيق للحقول */
            --accent-blue: #2563eb;    /* أزرق ملكي للأزرار والتفاعل */
            --accent-emerald: #059669; /* لمسات زمردية خفيفة للنجاح */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            
            /* خلفية الشفق القطبي (Aurora) الناعمة والانسيابية */
            background-color: #eef2f6;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(5, 150, 105, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(244, 63, 94, 0.06) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--glass-bg);
            /* تأثير تضبيب الزجاج الأبيض الفاخر */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.6);
            position: relative;
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            font-size: 26px;
            letter-spacing: -0.5px;
            margin-bottom: 8px; /* تقليل المسافة لتناسب العنوان الفرعي */
            margin-top: 0;
            font-weight: 700;
        }

        /* تنسيق العنوان الفرعي الجديد للكنيسة */
        .church-title {
            text-align: center;
            color: var(--text-label);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 35px; /* الحفاظ على المسافة قبل الحقول */
            opacity: 0.9;
        }

        /* شبكة تنظيم الحقول المتطورة */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 620px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-label);
            padding-right: 2px;
            transition: color 0.2s;
        }

        input {
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-main);
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* تفاعل الحقول النقي عند الضغط */
        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.15);
            transform: translateY(-1px);
        }

        /* تغيير خفيف في لون الـ Label عند التفاعل */
        .form-group input:focus + label,
        .form-group input:focus ~ label {
            color: var(--accent-blue);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        /* زرار أزرق ملكي أنيق وعميق */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
        
        #result-message {
            display: none;
            text-align: center;
            font-weight: 600;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }
        .success { color: #065f46; background-color: rgba(5, 150, 105, 0.1); border: 1px solid rgba(5, 150, 105, 0.2); }
        .error { color: #991b1b; background-color: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.2); }

        /* التوقيع الشيك مدمج بهدوء وبدون بهرجة */
        .footer-signature {
            text-align: center;
            margin-top: 35px;
            font-size: 10.5px;
            color: #94a3b8;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>تسجيل بيانات - إعداد خدام</h2>
        <!-- العنوان الفرعي المضاف حديثاً -->
        <div class="church-title">كنيسة السيدة العذراء والقديسة مريم المجدلية</div>
        
        <form id="studentForm" action="https://api.web3forms.com/submit" method="POST">
            
            <input type="hidden" name="access_key" value="bc88a71a-07a0-4ad3-ae7d-3edfcea81571">
            <input type="hidden" name="subject" value="خادم جديد قام بالتسجيل!">
            <input type="hidden" name="redirect" value="">

            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم الرباعي</label>
                    <input type="text" name="الاسم" required placeholder="اكتب الاسم كاملاً">
                </div>
                <div class="form-group">
                    <label>العنوان بالتفصيل</label>
                    <input type="text" name="العنوان" required placeholder="المنطقة، الشارع، العقار">
                </div>
                <div class="form-group">
                    <label>تاريخ الميلاد</label>
                    <input type="date" name="تاريخ الميلاد" required>
                </div>
                <div class="form-group">
                    <label>رقم الموبايل</label>
                    <input type="tel" name="رقم الموبايل" required placeholder="01xxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>المؤهل الدراسي</label>
                    <input type="text" name="المؤهل الدراسي" required placeholder="الكلية أو التخصص">
                </div>
                <div class="form-group">
                    <label>أب الاعتراف</label>
                    <input type="text" name="أب الاعتراف" required placeholder="اسم قدس أب الاعتراف">
                </div>
            </div>
            
            <div class="buttons-container">
                <button type="submit">إرسال البيانات 💾</button>
            </div>
            
            <div id="result-message"></div>
        </form>

        <div class="footer-signature">
            // made by thomas wael
        </div>
    </div>

    <script>
        const form = document.getElementById('studentForm');
        const resultMessage = document.getElementById('result-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            resultMessage.style.display = 'block';
            resultMessage.className = '';
            resultMessage.innerText = 'جاري إرسال بياناتك... ⏳';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (response.status == 200) {
                    resultMessage.className = 'success';
                    resultMessage.innerText = 'تم حفظ بياناتك بنجاح! شكراً لك. 🎉';
                    form.reset();
                } else {
                    resultMessage.className = 'error';
                    resultMessage.innerText = res.message;
                }
            })
            .catch(error => {
                resultMessage.className = 'error';
                resultMessage.innerText = 'عذراً، حدث خطأ في الاتصال بالشبكة!';
            })
            .then(() => {
                setTimeout(() => {
                    resultMessage.style.display = 'none';
                }, 5000);
            });
        });
    </script>
</body>
</html>
