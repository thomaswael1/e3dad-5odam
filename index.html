<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل بيانات - إعداد خدام</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input {
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 5px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .buttons-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            width: 100%;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .btn-submit { background-color: #3498db; }
        .btn-submit:hover { background-color: #2980b9; }
        
        #result-message {
            display: none;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .success { color: #2ecc71; background-color: #e8f8f0; }
        .error { color: #e74c3c; background-color: #fdedec; }
    </style>
</head>
<body>

    <div class="container">
        <h2>تسجيل بيانات - إعداد خدام</h2>
        
        <form id="studentForm" action="https://api.web3forms.com/submit" method="POST">
            
            <input type="hidden" name="access_key" value="bc88a71a-07a0-4ad3-ae7d-3edfcea81571">
            
            <input type="hidden" name="subject" value="خادم جديد قام بالتسجيل!">
            <input type="hidden" name="redirect" value="">

            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم الرباعي</label>
                    <input type="text" name="الاسم" required>
                </div>
                <div class="form-group">
                    <label>العنوان بالتفصيل</label>
                    <input type="text" name="العنوان" required>
                </div>
                <div class="form-group">
                    <label>تاريخ الميلاد</label>
                    <input type="date" name="تاريخ الميلاد" required>
                </div>
                <div class="form-group">
                    <label>رقم الموبايل</label>
                    <input type="tel" name="رقم الموبايل" required>
                </div>
                <div class="form-group">
                    <label>المؤهل الدراسي</label>
                    <input type="text" name="المؤهل الدراسي" required>
                </div>
                <div class="form-group">
                    <label>أب الاعتراف</label>
                    <input type="text" name="أب الاعتراف" required>
                </div>
            </div>
            
            <div class="buttons-container">
                <button type="submit" class="btn-submit">إرسال البيانات 💾</button>
            </div>
            
            <div id="result-message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('studentForm');
        const resultMessage = document.getElementById('result-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            resultMessage.style.display = 'block';
            resultMessage.className = '';
            resultMessage.innerText = 'جاري إرسال بياناتك... ⏳';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (response.status == 200) {
                    resultMessage.className = 'success';
                    resultMessage.innerText = 'تم حفظ بياناتك بنجاح! شكراً لك. 🎉';
                    form.reset();
                } else {
                    console.log(response);
                    resultMessage.className = 'error';
                    resultMessage.innerText = res.message;
                }
            })
            .catch(error => {
                console.log(error);
                resultMessage.className = 'error';
                resultMessage.innerText = 'عذراً، حدث خطأ في الاتصال بالشبكة!';
            })
            .then(() => {
                setTimeout(() => {
                    resultMessage.style.display = 'none';
                }, 5000);
            });
        });
    </script>
</body>
</html>
